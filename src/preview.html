<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>metadata-gen preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --border: #e0e0e0;
      --border-subtle: #eee;
      --text: #111;
      --text-secondary: #666;
      --text-tertiary: #999;
      --btn-bg: #f0f0f0;
      --btn-border: #ddd;
      --btn-text: #333;
      --btn-hover-bg: #e5e5e5;
      --primary-bg: #111;
      --primary-text: #fff;
      --primary-hover: #333;
      --success: #16a34a;
      --input-border: #ccc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-card: #111;
        --bg-input: #0a0a0a;
        --border: #1a1a1a;
        --border-subtle: #1a1a1a;
        --text: #e5e5e5;
        --text-secondary: #666;
        --text-tertiary: #555;
        --btn-bg: #1a1a1a;
        --btn-border: #333;
        --btn-text: #ccc;
        --btn-hover-bg: #222;
        --primary-bg: #fff;
        --primary-text: #000;
        --primary-hover: #e5e5e5;
        --success: #4ade80;
        --input-border: #333;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 40px 32px 80px;
      max-width: 1440px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 32px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 64px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header { padding: 16px 20px 12px; }

    .card-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .card-layout {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .card-preview {
      aspect-ratio: 1200 / 630;
      overflow: hidden;
      padding: 0 12px;
    }

    .card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 8px;
    }

    .card-footer {
      padding: 12px 20px 16px;
    }

    .card-actions { display: flex; gap: 12px; }

    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { background: var(--btn-hover-bg); color: var(--text); }
    button:disabled { opacity: 0.4; cursor: default; }

    button.primary { background: var(--primary-bg); color: var(--primary-text); border-color: var(--primary-bg); }
    button.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

    .success { font-size: 13px; color: var(--success); padding: 8px 0; }

    .refine-panel {
      display: none;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
    }

    .refine-panel.open { display: block; }

    .refine-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .refine-row:last-child { margin-bottom: 0; }

    .refine-label {
      font-size: 12px;
      color: var(--text-secondary);
      width: 90px;
      flex-shrink: 0;
    }

    .refine-row input[type="text"] {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
    }

    .refine-row input[type="text"]:focus { outline: none; border-color: var(--text-secondary); }

    .refine-row input[type="color"] {
      width: 32px;
      height: 32px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      padding: 2px;
    }

    .refine-row select {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
    }

    .favicon-section { margin-top: 24px; }

    .favicon-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .favicon-card-header { padding: 16px 20px 12px; }

    .favicon-mode {
      padding: 24px 20px;
    }

    .favicon-mode + .favicon-mode {
      border-top: 1px solid var(--border);
    }

    .favicon-mode-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .favicon-mode.light { background: #fafafa; }
    .favicon-mode.light .favicon-mode-label { color: #999; }
    .favicon-mode.dark { background: #000; }
    .favicon-mode.dark .favicon-mode-label { color: #666; }
    .favicon-mode.dark .favicon-size { color: #555; }

    .favicon-previews { display: flex; align-items: flex-end; gap: 24px; }

    .favicon-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .favicon-preview img { image-rendering: pixelated; }
    .favicon-size { font-size: 11px; color: var(--text-secondary); }
    .favicon-mode.light .favicon-size { color: #aaa; }

    .refine-row input[type="range"] {
      flex: 1;
      accent-color: var(--text-secondary);
    }

    .range-value {
      font-size: 12px;
      color: var(--text-tertiary);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    .favicon-actions { display: flex; gap: 12px; align-items: center; }

    .favicon-customize-panel {
      display: none;
      margin-top: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .favicon-customize-panel.open { display: block; }

    @media (max-width: 1024px) {
      .cards { grid-template-columns: 1fr; max-width: 640px; }
    }
  </style>
</head>
<body>
  <h1>Metadata images</h1>
  <div class="cards" id="cards"></div>

  <h1>Favicon set</h1>
  <div class="favicon-section">
    <div id="faviconGrid"></div>
    <div class="favicon-actions" id="faviconActions"></div>
    <div class="favicon-customize-panel" id="faviconCustomize"></div>
  </div>

  <script>
    const layouts = ['A', 'B', 'C'];
    const DEFAULT_HEADING_SIZES = { A: 64, B: 56, C: 72 };
    const DEFAULT_TAGLINE_SIZES = { A: 28, B: 26, C: 22 };
    const cardOverrides = { A: {}, B: {}, C: {} };
    let config = {};
    let logoCandidates = [];
    let faviconOverrides = {};

    function el(tag, attrs, ...children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'className') node.className = v;
          else if (k === 'textContent') node.textContent = v;
          else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
          else node.setAttribute(k, v);
        }
      }
      for (const child of children) {
        if (child == null) continue;
        if (typeof child === 'string') node.appendChild(document.createTextNode(child));
        else node.appendChild(child);
      }
      return node;
    }

    // --- OG Image cards ---

    function buildRefinePanel(layout) {
      const colors = config.colors || {};

      function colorRow(label, key, value) {
        return el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: label }),
          el('input', { type: 'color', value: value || '#000000', onChange: (e) => updateOverride(layout, key, e.target.value) })
        );
      }

      function textRow(label, key, value) {
        return el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: label }),
          el('input', { type: 'text', value: value || '', onChange: (e) => updateOverride(layout, key, e.target.value) })
        );
      }

      function sliderRow(label, key, value, min, max) {
        const valueLabel = el('span', { className: 'range-value', textContent: `${value}px` });
        const slider = el('input', { type: 'range', min: String(min), max: String(max), value: String(value) });
        slider.addEventListener('input', () => {
          valueLabel.textContent = `${slider.value}px`;
        });
        slider.addEventListener('change', () => {
          updateOverride(layout, key, parseInt(slider.value));
        });
        return el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: label }),
          slider,
          valueLabel
        );
      }

      // Logo select dropdown
      const logoSelect = el('select', { onChange: (e) => {
        const val = e.target.value;
        if (val === '__hide__') {
          cardOverrides[layout].showLogo = false;
          cardOverrides[layout].logoPath = undefined;
        } else if (val === '__none__') {
          cardOverrides[layout].showLogo = true;
          cardOverrides[layout].logoPath = undefined;
        } else {
          cardOverrides[layout].showLogo = true;
          cardOverrides[layout].logoPath = val;
        }
        rerender(layout);
      }});

      const currentLogo = config.logo || null;
      if (currentLogo) {
        logoSelect.appendChild(el('option', { value: '__none__', textContent: currentLogo }));
      } else {
        logoSelect.appendChild(el('option', { value: '__none__', textContent: 'None (text only)' }));
      }
      for (const candidate of logoCandidates) {
        if (candidate !== currentLogo) {
          logoSelect.appendChild(el('option', { value: candidate, textContent: candidate }));
        }
      }
      logoSelect.appendChild(el('option', { value: '__hide__', textContent: 'Hide logo' }));

      const panel = el('div', { className: 'refine-panel', id: `refine-${layout}` },
        colorRow('background', 'background', colors.background),
        colorRow('heading', 'foreground', colors.foreground),
        colorRow('tagline', 'taglineColor', colors.foreground),
        colorRow('accent', 'accent', colors.accent),
        textRow('headline', 'headline', config.title),
        textRow('tagline text', 'tagline', config.tagline),
        sliderRow('heading size', 'headingSize', DEFAULT_HEADING_SIZES[layout], 24, 96),
        sliderRow('tagline size', 'taglineSize', DEFAULT_TAGLINE_SIZES[layout], 14, 48),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'logo' }),
          logoSelect
        )
      );
      return panel;
    }

    function buildCard(layout, index, imageSrc) {
      const previewImg = el('img', { id: `preview-${layout}`, src: imageSrc, alt: `Option ${index + 1}` });

      const customizeBtn = el('button', { textContent: 'Customize' });
      customizeBtn.addEventListener('click', () => toggleRefine(layout));

      const dlBtn = el('button', { className: 'primary', id: `dl-${layout}`, textContent: 'Download PNG' });
      dlBtn.addEventListener('click', () => downloadOg(layout));

      const card = el('div', { className: 'card' },
        el('div', { className: 'card-header' },
          el('div', { className: 'card-label', textContent: `Option ${index + 1}` })
        ),
        el('div', { className: 'card-preview' }, previewImg),
        el('div', { className: 'card-footer' },
          el('div', { className: 'card-actions' }, customizeBtn, dlBtn)
        ),
        buildRefinePanel(layout)
      );
      return card;
    }

    async function loadPreviews() {
      const [previewsRes, configRes, logosRes] = await Promise.all([
        fetch('/api/previews'),
        fetch('/api/config'),
        fetch('/api/logo-candidates'),
      ]);
      const previews = await previewsRes.json();
      config = await configRes.json();
      logoCandidates = await logosRes.json();

      const container = document.getElementById('cards');
      container.innerHTML = '';
      layouts.forEach((layout, i) => {
        container.appendChild(buildCard(layout, i, previews[layout]));
      });
    }

    function toggleRefine(layout) {
      document.getElementById(`refine-${layout}`).classList.toggle('open');
    }

    async function updateOverride(layout, key, value) {
      cardOverrides[layout][key] = value;
      await rerender(layout);
    }

    async function rerender(layout) {
      const img = document.getElementById(`preview-${layout}`);
      img.style.opacity = '0.5';
      try {
        const res = await fetch('/api/render', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layout, overrides: cardOverrides[layout] }),
        });
        const data = await res.json();
        img.src = data.image;
      } catch (err) {
        console.error('Render failed:', err);
      } finally {
        img.style.opacity = '1';
      }
    }

    async function downloadOg(layout) {
      const btn = document.getElementById(`dl-${layout}`);
      btn.disabled = true;
      btn.textContent = 'Saving...';
      try {
        const res = await fetch('/api/download/og', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layout }),
        });
        const data = await res.json();
        const span = el('span', { className: 'success', textContent: `\u2713 Saved to ${data.path}` });
        btn.replaceWith(span);
      } catch (err) {
        btn.textContent = 'Error';
        console.error('Download failed:', err);
      }
    }

    // --- Favicon section ---

    function buildFaviconMode(label, cssClass, previews, sizes) {
      const previewsContainer = el('div', { className: 'favicon-previews' });
      sizes.forEach(size => {
        const displaySize = Math.min(size, 96);
        previewsContainer.appendChild(
          el('div', { className: 'favicon-preview' },
            el('img', { src: previews[size], width: displaySize, height: displaySize }),
            el('span', { className: 'favicon-size', textContent: `${size}px` })
          )
        );
      });
      return el('div', { className: `favicon-mode ${cssClass}` },
        el('div', { className: 'favicon-mode-label', textContent: label }),
        previewsContainer
      );
    }

    function renderFaviconGrid(previews) {
      const grid = document.getElementById('faviconGrid');
      const sizes = [16, 32, 96, 180];
      grid.innerHTML = '';

      const card = el('div', { className: 'favicon-card' },
        el('div', { className: 'favicon-card-header' },
          el('div', { className: 'card-label', textContent: 'Lettermark' })
        ),
        buildFaviconMode('Option 1 \u2014 Light', 'light', previews, sizes),
        buildFaviconMode('Option 1 \u2014 Dark', 'dark', previews, sizes)
      );
      grid.appendChild(card);
    }

    async function rerenderFavicons() {
      try {
        const res = await fetch('/api/render-favicon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(faviconOverrides),
        });
        const previews = await res.json();
        renderFaviconGrid(previews);
      } catch (err) {
        console.error('Favicon render failed:', err);
      }
    }

    function buildFaviconCustomizePanel() {
      const defaultLetter = (config.title || 'A')[0].toUpperCase();
      const colors = config.colors || {};

      const letterInput = el('input', { type: 'text', value: defaultLetter, maxLength: '1' });
      letterInput.style.width = '48px';
      letterInput.style.textAlign = 'center';
      letterInput.addEventListener('change', () => {
        const v = letterInput.value.trim();
        if (v) faviconOverrides.letter = v;
        else delete faviconOverrides.letter;
        rerenderFavicons();
      });

      const srcSelect = el('select', {});
      srcSelect.appendChild(el('option', { value: '__lettermark__', textContent: 'Lettermark' }));
      for (const candidate of logoCandidates) {
        srcSelect.appendChild(el('option', { value: candidate, textContent: candidate }));
      }
      if (config.faviconSrc) srcSelect.value = config.faviconSrc;
      srcSelect.addEventListener('change', () => {
        const v = srcSelect.value;
        faviconOverrides.faviconSrc = v === '__lettermark__' ? null : v;
        rerenderFavicons();
      });

      function faviconColorRow(label, key, value) {
        return el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: label }),
          el('input', { type: 'color', value: value || '#000000', onChange: (e) => {
            faviconOverrides[key] = e.target.value;
            rerenderFavicons();
          }})
        );
      }

      const panel = document.getElementById('faviconCustomize');
      panel.innerHTML = '';
      panel.appendChild(faviconColorRow('background', 'background', colors.background));
      panel.appendChild(faviconColorRow('letter color', 'accent', colors.accent));
      panel.appendChild(el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'letter' }),
        letterInput
      ));
      panel.appendChild(el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'source' }),
        srcSelect
      ));
    }

    async function loadFaviconPreviews() {
      const res = await fetch('/api/favicon-previews');
      const previews = await res.json();
      renderFaviconGrid(previews);

      const actions = document.getElementById('faviconActions');
      actions.innerHTML = '';

      const customizeBtn = el('button', { textContent: 'Customize' });
      customizeBtn.addEventListener('click', () => {
        const panel = document.getElementById('faviconCustomize');
        if (!panel.hasChildNodes()) buildFaviconCustomizePanel();
        panel.classList.toggle('open');
      });

      const dlBtn = el('button', { className: 'primary', textContent: 'Download favicon set' });
      dlBtn.addEventListener('click', async () => {
        dlBtn.disabled = true;
        dlBtn.textContent = 'Saving...';
        try {
          const res = await fetch('/api/download/favicons', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
          const data = await res.json();
          const span = el('span', { className: 'success',
            textContent: `\u2713 Saved to ${config.outputDir || 'public/metadata'}/ (${data.count} files)` });
          dlBtn.replaceWith(span);
        } catch (err) {
          dlBtn.textContent = 'Error';
          console.error('Favicon download failed:', err);
        }
      });

      actions.appendChild(customizeBtn);
      actions.appendChild(dlBtn);
    }

    loadPreviews();
    loadFaviconPreviews();
  </script>
</body>
</html>
