<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>metadata-gen preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --bg-card: #ffffff;
      --bg-muted: rgba(0,0,0,0.04);
      --border: #e0e0e0;
      --border-60: rgba(0,0,0,0.08);
      --text: #111;
      --text-muted: #888;
      --text-tertiary: #aaa;
      --btn-bg: #f0f0f0;
      --btn-border: #ddd;
      --btn-text: #333;
      --btn-hover-bg: #e5e5e5;
      --primary-bg: #111;
      --primary-text: #fff;
      --primary-hover: #333;
      --success: #16a34a;
      --focus-ring: #6B97FF;
      --surface: rgba(0,0,0,0.04);
      --surface-active: rgba(0,0,0,0.08);
      --fg-8: rgba(0,0,0,0.08);
      --fg-25: rgba(0,0,0,0.25);
      --fg-50: rgba(0,0,0,0.5);
      --accent-40: rgba(99,102,241,0.4);
      --dropdown-shadow: 0 4px 12px rgba(0,0,0,0.02);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-card: #111;
        --bg-muted: rgba(255,255,255,0.06);
        --border: #1a1a1a;
        --border-60: rgba(255,255,255,0.08);
        --text: #e5e5e5;
        --text-muted: #666;
        --text-tertiary: #555;
        --btn-bg: #1a1a1a;
        --btn-border: #333;
        --btn-text: #ccc;
        --btn-hover-bg: #222;
        --primary-bg: #fff;
        --primary-text: #000;
        --primary-hover: #e5e5e5;
        --success: #4ade80;
        --surface: rgba(255,255,255,0.06);
        --surface-active: rgba(255,255,255,0.1);
        --fg-8: rgba(255,255,255,0.08);
        --fg-25: rgba(255,255,255,0.25);
        --fg-50: rgba(255,255,255,0.5);
        --accent-40: rgba(99,102,241,0.25);
        --dropdown-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 40px 32px 80px;
      max-width: 1440px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 32px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 64px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header { padding: 16px 20px 12px; }
    .card-label { font-size: 14px; font-weight: 600; color: var(--text); }

    .card-preview { aspect-ratio: 1200 / 630; overflow: hidden; padding: 0 12px; }
    .card-preview img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 8px; }

    .card-footer { padding: 12px 20px 16px; }
    .card-actions { display: flex; gap: 12px; }

    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      transition: all 80ms;
    }

    button:hover { background: var(--btn-hover-bg); color: var(--text); }
    button:disabled { opacity: 0.4; cursor: default; }

    button.primary { background: var(--primary-bg); color: var(--primary-text); border-color: var(--primary-bg); }
    button.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

    .success { font-size: 13px; color: var(--success); padding: 8px 0; display: inline-block; }

    /* --- Refine panel --- */

    .refine-panel {
      display: none;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
    }

    .refine-panel.open { display: flex; flex-direction: column; gap: 8px; }

    .refine-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .refine-label {
      font-size: 12px;
      color: var(--text-muted);
      width: 90px;
      flex-shrink: 0;
    }

    /* --- FF-inspired Text Input --- */

    .ff-input {
      flex: 1;
      height: 36px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: all 80ms;
    }

    .ff-input:hover {
      background: var(--bg-muted);
      border-color: var(--border);
    }

    .ff-input:focus {
      background: var(--bg-card);
      border-color: var(--border);
      box-shadow: 0 0 0 1px var(--focus-ring);
    }

    .ff-input::placeholder { color: var(--text-muted); }

    /* --- FF-inspired Color Picker --- */

    .ff-color-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 4px 0 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      transition: all 80ms;
      cursor: pointer;
    }

    .ff-color-wrap:hover {
      background: var(--bg-muted);
      border-color: var(--border);
    }

    .ff-color-hex {
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text-muted);
      min-width: 60px;
    }

    .ff-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border-60);
      cursor: pointer;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    .ff-color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
    .ff-color-swatch::-webkit-color-swatch { border: none; border-radius: 5px; }
    .ff-color-swatch::-moz-color-swatch { border: none; border-radius: 5px; }

    /* --- FF-inspired Slider (Scrubber variant) --- */

    .ff-slider {
      flex: 1;
      position: relative;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: ew-resize;
      user-select: none;
      -webkit-user-select: none;
      transition: border-color 80ms;
    }

    .ff-slider:hover { border-color: var(--fg-25); }
    .ff-slider:focus-within { border-color: var(--focus-ring); outline: none; }

    .ff-slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      background: var(--fg-8);
      pointer-events: none;
    }

    .ff-slider-handle {
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 2px;
      border-radius: 999px;
      background: var(--fg-25);
      pointer-events: none;
      transition: background 80ms;
      z-index: 3;
    }

    .ff-slider:hover .ff-slider-handle { background: var(--fg-50); }
    .ff-slider:active .ff-slider-handle { background: var(--text); top: 7px; bottom: 7px; }

    .ff-slider-value {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text-muted);
      pointer-events: none;
      z-index: 4;
      transition: color 80ms;
    }

    .ff-slider:hover .ff-slider-value { color: var(--text); }

    .ff-slider input[type="range"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: ew-resize;
      margin: 0;
      z-index: 5;
    }

    /* --- FF-inspired Select --- */

    .ff-select {
      flex: 1;
      position: relative;
    }

    .ff-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      height: 36px;
      padding: 0 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: all 80ms;
      -webkit-appearance: none;
      appearance: none;
    }

    .ff-select-trigger:hover { background: var(--bg-muted); }
    .ff-select-trigger:focus { box-shadow: 0 0 0 1px var(--focus-ring); }

    .ff-select-chevron {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: color 80ms;
    }

    .ff-select-trigger:hover .ff-select-chevron { color: var(--text); }

    /* Native select overlay (invisible, handles interaction) */
    .ff-select select {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 13px;
    }

    /* --- Favicon section --- */

    .favicon-section { margin-top: 24px; }

    .favicon-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      max-width: 720px;
    }

    .favicon-card-header { padding: 16px 20px 12px; }

    .favicon-mode { padding: 24px 20px; }
    .favicon-mode + .favicon-mode { border-top: 1px solid var(--border); }

    .favicon-mode-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .favicon-mode.light { background: #fafafa; }
    .favicon-mode.light .favicon-mode-label { color: #999; }
    .favicon-mode.dark { background: #000; }
    .favicon-mode.dark .favicon-mode-label { color: #666; }
    .favicon-mode.dark .favicon-size { color: #555; }

    .favicon-previews { display: flex; align-items: flex-end; gap: 24px; }

    .favicon-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .favicon-preview img { image-rendering: pixelated; }
    .favicon-size { font-size: 11px; color: var(--text-muted); }
    .favicon-mode.light .favicon-size { color: #aaa; }

    .favicon-actions { display: flex; gap: 12px; align-items: center; }

    .favicon-customize-panel {
      display: none;
      margin-top: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 720px;
    }

    .favicon-customize-panel.open { display: flex; flex-direction: column; gap: 8px; }

    @media (max-width: 1024px) {
      .cards { grid-template-columns: 1fr; max-width: 640px; }
    }
  </style>
</head>
<body>
  <h1>Metadata images</h1>
  <div class="cards" id="cards"></div>

  <h1>Favicon set</h1>
  <div class="favicon-section">
    <div id="faviconGrid"></div>
    <div class="favicon-actions" id="faviconActions"></div>
    <div class="favicon-customize-panel" id="faviconCustomize"></div>
  </div>

  <script>
    const layouts = ['A', 'B', 'C'];
    const DEFAULT_HEADING_SIZES = { A: 64, B: 56, C: 72 };
    const DEFAULT_TAGLINE_SIZES = { A: 28, B: 26, C: 22 };
    const cardOverrides = { A: {}, B: {}, C: {} };
    let config = {};
    let logoCandidates = [];
    let faviconOverrides = {};

    function el(tag, attrs, ...children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'className') node.className = v;
          else if (k === 'textContent') node.textContent = v;
          else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
          else node.setAttribute(k, v);
        }
      }
      for (const child of children) {
        if (child == null) continue;
        if (typeof child === 'string') node.appendChild(document.createTextNode(child));
        else node.appendChild(child);
      }
      return node;
    }

    // --- FF-inspired component builders ---

    function ffSlider(value, min, max, unit, onChange) {
      const container = el('div', { className: 'ff-slider' });
      const fill = el('div', { className: 'ff-slider-fill' });
      const handle = el('div', { className: 'ff-slider-handle' });
      const valueEl = el('div', { className: 'ff-slider-value', textContent: `${value}${unit}` });
      const input = el('input', { type: 'range', min: String(min), max: String(max), value: String(value) });

      function update(v) {
        const pct = ((v - min) / (max - min)) * 100;
        fill.style.width = `${pct}%`;
        handle.style.left = `calc(${pct}% - 1px)`;
        valueEl.textContent = `${v}${unit}`;
      }

      update(value);
      input.addEventListener('input', () => update(input.value));
      input.addEventListener('change', () => onChange(parseInt(input.value)));

      container.append(fill, handle, valueEl, input);
      return container;
    }

    function ffColor(label, value, onChange) {
      const hexLabel = el('span', { className: 'ff-color-hex', textContent: value });
      const swatch = el('input', { type: 'color', className: 'ff-color-swatch', value: value });
      swatch.addEventListener('input', () => {
        hexLabel.textContent = swatch.value;
        onChange(swatch.value);
      });
      const wrap = el('div', { className: 'ff-color-wrap' });
      wrap.addEventListener('click', () => swatch.click());
      wrap.append(hexLabel, swatch);
      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        wrap
      );
    }

    function ffInput(label, value, onChange) {
      const input = el('input', { type: 'text', className: 'ff-input', value: value || '' });
      input.placeholder = label;
      input.addEventListener('change', () => onChange(input.value));
      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        input
      );
    }

    function ffSelect(label, options, selectedValue, onChange) {
      // options: [{ value, label }]
      const container = el('div', { className: 'ff-select' });

      const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      chevron.setAttribute('viewBox', '0 0 16 16');
      chevron.setAttribute('fill', 'none');
      chevron.classList.add('ff-select-chevron');
      chevron.innerHTML = '<path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';

      const selectedLabel = options.find(o => o.value === selectedValue)?.label || options[0]?.label || '';
      const triggerText = el('span', { textContent: selectedLabel });
      const trigger = el('div', { className: 'ff-select-trigger' });
      trigger.append(triggerText, chevron);

      const nativeSelect = document.createElement('select');
      options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        if (opt.value === selectedValue) o.selected = true;
        nativeSelect.appendChild(o);
      });
      nativeSelect.addEventListener('change', () => {
        const opt = options.find(o => o.value === nativeSelect.value);
        triggerText.textContent = opt?.label || nativeSelect.value;
        onChange(nativeSelect.value);
      });

      container.append(trigger, nativeSelect);
      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        container
      );
    }

    // --- OG Image cards ---

    function buildRefinePanel(layout) {
      const colors = config.colors || {};

      // Logo options
      const currentLogo = config.logo || null;
      const logoOpts = [];
      if (currentLogo) {
        logoOpts.push({ value: '__none__', label: currentLogo });
      } else {
        logoOpts.push({ value: '__none__', label: 'None (text only)' });
      }
      for (const c of logoCandidates) {
        if (c !== currentLogo) logoOpts.push({ value: c, label: c });
      }
      logoOpts.push({ value: '__hide__', label: 'Hide logo' });

      const panel = el('div', { className: 'refine-panel', id: `refine-${layout}` },
        ffColor('background', colors.background, (v) => updateOverride(layout, 'background', v)),
        ffColor('heading', colors.foreground, (v) => updateOverride(layout, 'foreground', v)),
        ffColor('tagline', colors.foreground, (v) => updateOverride(layout, 'taglineColor', v)),
        ffColor('accent', colors.accent, (v) => updateOverride(layout, 'accent', v)),
        ffInput('headline', config.title, (v) => updateOverride(layout, 'headline', v)),
        ffInput('tagline text', config.tagline, (v) => updateOverride(layout, 'tagline', v)),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'heading size' }),
          ffSlider(DEFAULT_HEADING_SIZES[layout], 24, 96, 'px', (v) => updateOverride(layout, 'headingSize', v))
        ),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'tagline size' }),
          ffSlider(DEFAULT_TAGLINE_SIZES[layout], 14, 48, 'px', (v) => updateOverride(layout, 'taglineSize', v))
        ),
        ffSelect('logo', logoOpts, '__none__', (val) => {
          if (val === '__hide__') {
            cardOverrides[layout].showLogo = false;
            cardOverrides[layout].logoPath = undefined;
          } else if (val === '__none__') {
            cardOverrides[layout].showLogo = true;
            cardOverrides[layout].logoPath = undefined;
          } else {
            cardOverrides[layout].showLogo = true;
            cardOverrides[layout].logoPath = val;
          }
          rerender(layout);
        })
      );
      return panel;
    }

    function buildCard(layout, index, imageSrc) {
      const previewImg = el('img', { id: `preview-${layout}`, src: imageSrc, alt: `Option ${index + 1}` });

      const customizeBtn = el('button', { textContent: 'Customize' });
      customizeBtn.addEventListener('click', () => toggleRefine(layout));

      const dlBtn = el('button', { className: 'primary', id: `dl-${layout}`, textContent: 'Download PNG' });
      dlBtn.addEventListener('click', () => downloadOg(layout));

      return el('div', { className: 'card' },
        el('div', { className: 'card-header' },
          el('div', { className: 'card-label', textContent: `Option ${index + 1}` })
        ),
        el('div', { className: 'card-preview' }, previewImg),
        el('div', { className: 'card-footer' },
          el('div', { className: 'card-actions' }, customizeBtn, dlBtn)
        ),
        buildRefinePanel(layout)
      );
    }

    async function loadPreviews() {
      const [previewsRes, configRes, logosRes] = await Promise.all([
        fetch('/api/previews'),
        fetch('/api/config'),
        fetch('/api/logo-candidates'),
      ]);
      const previews = await previewsRes.json();
      config = await configRes.json();
      logoCandidates = await logosRes.json();

      const container = document.getElementById('cards');
      container.innerHTML = '';
      layouts.forEach((layout, i) => {
        container.appendChild(buildCard(layout, i, previews[layout]));
      });
    }

    function toggleRefine(layout) {
      document.getElementById(`refine-${layout}`).classList.toggle('open');
    }

    async function updateOverride(layout, key, value) {
      cardOverrides[layout][key] = value;
      await rerender(layout);
    }

    async function rerender(layout) {
      const img = document.getElementById(`preview-${layout}`);
      img.style.opacity = '0.5';
      try {
        const res = await fetch('/api/render', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layout, overrides: cardOverrides[layout] }),
        });
        const data = await res.json();
        img.src = data.image;
      } catch (err) {
        console.error('Render failed:', err);
      } finally {
        img.style.opacity = '1';
      }
    }

    async function downloadOg(layout) {
      const btn = document.getElementById(`dl-${layout}`);
      btn.disabled = true;
      btn.textContent = 'Saving...';
      try {
        const res = await fetch('/api/download/og', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layout }),
        });
        const data = await res.json();
        const span = el('span', { className: 'success', textContent: `\u2713 Saved to ${data.path}` });
        btn.replaceWith(span);
      } catch (err) {
        btn.textContent = 'Error';
        console.error('Download failed:', err);
      }
    }

    // --- Favicon section ---

    function buildFaviconMode(label, cssClass, previews, sizes) {
      const previewsContainer = el('div', { className: 'favicon-previews' });
      sizes.forEach(size => {
        const displaySize = Math.min(size, 96);
        previewsContainer.appendChild(
          el('div', { className: 'favicon-preview' },
            el('img', { src: previews[size], width: displaySize, height: displaySize }),
            el('span', { className: 'favicon-size', textContent: `${size}px` })
          )
        );
      });
      return el('div', { className: `favicon-mode ${cssClass}` },
        el('div', { className: 'favicon-mode-label', textContent: label }),
        previewsContainer
      );
    }

    function renderFaviconGrid(previews) {
      const grid = document.getElementById('faviconGrid');
      const sizes = [16, 32, 96, 180];
      grid.innerHTML = '';
      grid.appendChild(el('div', { className: 'favicon-card' },
        el('div', { className: 'favicon-card-header' },
          el('div', { className: 'card-label', textContent: 'Lettermark' })
        ),
        buildFaviconMode('Option 1 \u2014 Light', 'light', previews, sizes),
        buildFaviconMode('Option 1 \u2014 Dark', 'dark', previews, sizes)
      ));
    }

    async function rerenderFavicons() {
      try {
        const res = await fetch('/api/render-favicon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(faviconOverrides),
        });
        const previews = await res.json();
        renderFaviconGrid(previews);
      } catch (err) {
        console.error('Favicon render failed:', err);
      }
    }

    function buildFaviconCustomizePanel() {
      const defaultLetter = (config.title || 'A')[0].toUpperCase();
      const colors = config.colors || {};

      const letterInput = el('input', { type: 'text', className: 'ff-input', value: defaultLetter, maxLength: '4' });
      letterInput.style.width = '80px';
      letterInput.style.textAlign = 'center';
      letterInput.addEventListener('change', () => {
        const v = letterInput.value.trim();
        if (v) faviconOverrides.letter = v;
        else delete faviconOverrides.letter;
        rerenderFavicons();
      });

      const srcOpts = [{ value: '__lettermark__', label: 'Lettermark' }];
      for (const c of logoCandidates) srcOpts.push({ value: c, label: c });

      const panel = document.getElementById('faviconCustomize');
      panel.innerHTML = '';
      panel.appendChild(ffColor('background', colors.background, (v) => { faviconOverrides.background = v; rerenderFavicons(); }));
      panel.appendChild(ffColor('letter color', colors.accent, (v) => { faviconOverrides.accent = v; rerenderFavicons(); }));
      panel.appendChild(el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'letter' }),
        letterInput
      ));
      panel.appendChild(el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'letter size' }),
        ffSlider(60, 20, 80, '%', (v) => { faviconOverrides.letterSize = v; rerenderFavicons(); })
      ));
      panel.appendChild(el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'corner radius' }),
        ffSlider(19, 0, 50, '%', (v) => { faviconOverrides.borderRadius = v; rerenderFavicons(); })
      ));
      panel.appendChild(ffSelect('source', srcOpts, config.faviconSrc || '__lettermark__', (v) => {
        faviconOverrides.faviconSrc = v === '__lettermark__' ? null : v;
        rerenderFavicons();
      }));
    }

    async function loadFaviconPreviews() {
      const res = await fetch('/api/favicon-previews');
      const previews = await res.json();
      renderFaviconGrid(previews);

      const actions = document.getElementById('faviconActions');
      actions.innerHTML = '';

      const customizeBtn = el('button', { textContent: 'Customize' });
      customizeBtn.addEventListener('click', () => {
        const panel = document.getElementById('faviconCustomize');
        if (!panel.hasChildNodes()) buildFaviconCustomizePanel();
        panel.classList.toggle('open');
      });

      const dlBtn = el('button', { className: 'primary', textContent: 'Download favicon set' });
      dlBtn.addEventListener('click', async () => {
        dlBtn.disabled = true;
        dlBtn.textContent = 'Saving...';
        try {
          const res = await fetch('/api/download/favicons', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
          const data = await res.json();
          const span = el('span', { className: 'success',
            textContent: `\u2713 Saved to ${config.outputDir || 'public/metadata'}/ (${data.count} files)` });
          dlBtn.replaceWith(span);
        } catch (err) {
          dlBtn.textContent = 'Error';
          console.error('Favicon download failed:', err);
        }
      });

      actions.appendChild(customizeBtn);
      actions.appendChild(dlBtn);
    }

    loadPreviews();
    loadFaviconPreviews();
  </script>
</body>
</html>
