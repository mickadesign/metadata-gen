<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>metadata-gen preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --bg-card: #ffffff;
      --bg-muted: rgba(0,0,0,0.04);
      --border: #e0e0e0;
      --border-60: rgba(0,0,0,0.08);
      --text: #111;
      --text-muted: #888;
      --text-tertiary: #aaa;
      --btn-bg: #f0f0f0;
      --btn-border: #ddd;
      --btn-text: #333;
      --btn-hover-bg: #e5e5e5;
      --primary-bg: #111;
      --primary-text: #fff;
      --primary-hover: #333;
      --success: #16a34a;
      --focus-ring: #6B97FF;
      --surface: rgba(0,0,0,0.04);
      --surface-active: rgba(0,0,0,0.08);
      --fg-8: rgba(0,0,0,0.08);
      --fg-25: rgba(0,0,0,0.25);
      --fg-50: rgba(0,0,0,0.5);
      --accent-40: rgba(99,102,241,0.4);
      --dropdown-shadow: 0 4px 12px rgba(0,0,0,0.02);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-card: #111;
        --bg-muted: rgba(255,255,255,0.06);
        --border: #1a1a1a;
        --border-60: rgba(255,255,255,0.08);
        --text: #e5e5e5;
        --text-muted: #666;
        --text-tertiary: #555;
        --btn-bg: #1a1a1a;
        --btn-border: #333;
        --btn-text: #ccc;
        --btn-hover-bg: #222;
        --primary-bg: #fff;
        --primary-text: #000;
        --primary-hover: #e5e5e5;
        --success: #4ade80;
        --surface: rgba(255,255,255,0.06);
        --surface-active: rgba(255,255,255,0.1);
        --fg-8: rgba(255,255,255,0.08);
        --fg-25: rgba(255,255,255,0.25);
        --fg-50: rgba(255,255,255,0.5);
        --accent-40: rgba(99,102,241,0.25);
        --dropdown-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 40px 32px 80px;
      max-width: 1440px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 32px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
      align-items: start;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .card-header { padding: 16px 20px 12px; }
    .card-label { font-size: 14px; font-weight: 600; color: var(--text); }

    .card-preview { aspect-ratio: 1200 / 630; padding: 0 12px; }
    .card-preview img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 8px; }

    .card-footer { padding: 12px 20px 16px; }
    .card-actions { display: flex; gap: 12px; }

    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      transition: all 80ms;
    }

    button:hover { background: var(--btn-hover-bg); color: var(--text); }
    button:disabled { opacity: 0.4; cursor: default; }

    button.primary { background: var(--primary-bg); color: var(--primary-text); border-color: var(--primary-bg); }
    button.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

    .success { font-size: 13px; color: var(--success); padding: 8px 0; display: inline-block; }

    /* --- Refine panel --- */

    .refine-panel {
      display: none;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
    }

    .refine-panel.open { display: flex; flex-direction: column; gap: 8px; }

    .refine-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .refine-label {
      font-size: 12px;
      color: var(--text-muted);
      width: 90px;
      flex-shrink: 0;
    }

    .refine-label::first-letter { text-transform: uppercase; }

    /* --- FF-inspired Text Input --- */

    .ff-input {
      flex: 1;
      height: 36px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: all 80ms;
    }

    .ff-input:hover {
      background: var(--bg-muted);
      border-color: var(--border);
    }

    .ff-input:focus {
      background: var(--bg-card);
      border-color: var(--border);
      box-shadow: 0 0 0 1px var(--focus-ring);
    }

    .ff-input::placeholder { color: var(--text-muted); }

    /* --- FF-inspired Color Picker --- */

    .ff-color-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 4px 0 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      transition: all 80ms;
      cursor: pointer;
    }

    .ff-color-wrap:hover {
      background: var(--bg-muted);
      border-color: var(--border);
    }

    .ff-color-hex {
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text-muted);
      min-width: 60px;
    }

    .ff-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border-60);
      cursor: pointer;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    .ff-color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
    .ff-color-swatch::-webkit-color-swatch { border: none; border-radius: 5px; }
    .ff-color-swatch::-moz-color-swatch { border: none; border-radius: 5px; }

    /* --- FF-inspired Slider (Scrubber variant) --- */

    .ff-slider {
      flex: 1;
      position: relative;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: ew-resize;
      user-select: none;
      -webkit-user-select: none;
      transition: border-color 80ms;
    }

    .ff-slider:hover { border-color: var(--fg-25); }
    .ff-slider:focus-within { border-color: var(--focus-ring); outline: none; }

    .ff-slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      background: var(--fg-8);
      pointer-events: none;
    }

    .ff-slider-handle {
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 2px;
      border-radius: 999px;
      background: var(--fg-25);
      pointer-events: none;
      transition: background 80ms;
      z-index: 3;
    }

    .ff-slider:hover .ff-slider-handle { background: var(--fg-50); }
    .ff-slider:active .ff-slider-handle { background: var(--text); top: 7px; bottom: 7px; }

    .ff-slider-value {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text-muted);
      pointer-events: none;
      z-index: 4;
      transition: color 80ms;
    }

    .ff-slider:hover .ff-slider-value { color: var(--text); }

    .ff-slider input[type="range"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: ew-resize;
      margin: 0;
      z-index: 5;
    }

    /* --- FF-inspired Select --- */

    .ff-select {
      flex: 1;
      position: relative;
    }

    .ff-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      height: 36px;
      padding: 0 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: all 80ms;
      -webkit-appearance: none;
      appearance: none;
    }

    .ff-select-trigger:hover { background: var(--bg-muted); }
    .ff-select-trigger:focus { box-shadow: 0 0 0 1px var(--focus-ring); }

    .ff-select-chevron {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: color 80ms;
    }

    .ff-select-trigger:hover .ff-select-chevron { color: var(--text); }

    /* Native select overlay (invisible, handles interaction) */
    .ff-select select {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 13px;
    }

    /* --- Favicon section --- */

    .favicon-section {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 720px;
    }

    .favicon-tab-previews {
      display: flex;
      flex-direction: row;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .tab-preview {
      position: relative;
      width: 240px;
      height: 137px;
      border-radius: 8px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }

    .tab-preview-favicon {
      position: absolute;
      left: 55%;
      top: 47%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      display: block;
      image-rendering: auto;
    }

    .tab-preview-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: center;
    }

    .favicon-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      max-width: 720px;
    }

    .favicon-mode { padding: 24px 20px; }
    .favicon-mode + .favicon-mode { border-top: 1px solid var(--border); }

    .favicon-mode-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .favicon-mode-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .favicon-mode.light { background: #fafafa; }
    .favicon-mode.light .favicon-mode-label { color: #999; }
    .favicon-mode.dark { background: #000; }
    .favicon-mode.dark .favicon-mode-label { color: #666; }
    .favicon-mode.dark .favicon-size { color: #bbb; }
    .favicon-mode.custom .favicon-mode-label { color: rgba(255,255,255,0.75); mix-blend-mode: difference; }
    .favicon-mode.custom .favicon-size { color: rgba(255,255,255,0.6); mix-blend-mode: difference; }

    .favicon-previews { display: flex; align-items: flex-end; gap: 24px; }

    .favicon-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .favicon-preview img { image-rendering: pixelated; display: block; }

    .ff-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
    }

    .ff-toggle-track {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      transition: all 80ms;
    }

    .ff-toggle-track.active {
      background: var(--primary-bg);
      border-color: var(--primary-bg);
    }

    .ff-toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 7px;
      background: white;
      transition: transform 80ms;
    }

    .ff-toggle-track.active .ff-toggle-thumb {
      transform: translateX(16px);
    }
    .favicon-size { font-size: 11px; color: var(--text-muted); }
    .favicon-mode.light .favicon-size { color: #aaa; }

    .favicon-actions { display: flex; gap: 12px; align-items: center; }

    /* --- FF-inspired Search Select (searchable combobox with upload) --- */

    .ff-search-select {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    .ff-search-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: all 80ms;
    }

    .ff-search-input:hover { background: var(--bg-muted); }
    .ff-search-input:focus { box-shadow: 0 0 0 1px var(--focus-ring); }
    .ff-search-input::placeholder { color: var(--text-muted); }

    .ff-search-option.upload {
      color: var(--text);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    .ff-search-option.upload .icon {
      display: inline-flex;
      width: 18px;
      height: 18px;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: var(--bg-muted);
      font-size: 14px;
      line-height: 1;
    }

    .ff-search-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--dropdown-shadow);
      z-index: 10;
      display: none;
    }
    .ff-search-dropdown.open { display: block; }

    .ff-search-option {
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ff-search-option:hover,
    .ff-search-option.highlighted { background: var(--bg-muted); }
    .ff-search-option.selected { color: var(--text); font-weight: 500; }
    .ff-search-option .hint { color: var(--text-muted); font-size: 11px; margin-left: auto; }
    .ff-search-option.empty { color: var(--text-muted); font-style: italic; cursor: default; }
    .ff-search-option.empty:hover { background: transparent; }

    /* --- Option 4 card (AI prompts) --- */

    .card.option-4 .card-preview {
      aspect-ratio: 1200 / 630;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-muted);
      margin: 0 12px;
      border-radius: 8px;
    }
    .card.option-4 .card-preview-inner {
      text-align: center;
      color: var(--text-muted);
      padding: 24px;
    }
    .card.option-4 .card-preview-inner .title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .card.option-4 .card-preview-inner .sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .prompt-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .prompt-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .prompt-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .prompt-item-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .prompt-item-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .prompt-copy-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .prompt-composer {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .prompt-chip-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .prompt-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .prompt-chip {
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
    }
    .prompt-chip:hover { background: var(--bg-card); }
    .prompt-textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
    }
    .prompt-textarea:focus {
      outline: none;
      border-color: var(--text);
    }
    .prompt-composer-actions {
      display: flex;
      justify-content: flex-end;
    }
    .prompt-copy-full {
      font-size: 12px;
      padding: 6px 14px;
    }

    .favicon-customize-panel {
      display: none;
      margin-top: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 720px;
    }

    .favicon-customize-panel.open { display: flex; flex-direction: column; gap: 8px; }

    .favicon-sizes-panel { display: none; }
    .favicon-sizes-panel.open { display: block; }
    .favicon-sizes-panel .favicon-card { margin-bottom: 0; }

    @media (max-width: 1024px) {
      .cards { grid-template-columns: 1fr; max-width: 640px; }
    }
  </style>
</head>
<body>
  <h1>Favicon set</h1>
  <div class="favicon-section">
    <div class="favicon-tab-previews">
      <div>
        <div class="tab-preview" id="tabPreviewLight" style="background-image:url('/preview-assets/tab-light.png')">
          <img class="tab-preview-favicon" id="tabFaviconLight" alt="" />
        </div>
        <div class="tab-preview-label">Browser tab · light</div>
      </div>
      <div>
        <div class="tab-preview" id="tabPreviewDark" style="background-image:url('/preview-assets/tab-dark.png')">
          <img class="tab-preview-favicon" id="tabFaviconDark" alt="" />
        </div>
        <div class="tab-preview-label">Browser tab · dark</div>
      </div>
    </div>
    <div class="favicon-actions" id="faviconActions"></div>
    <div class="favicon-sizes-panel" id="faviconGrid"></div>
    <div class="favicon-customize-panel" id="faviconCustomize"></div>
  </div>

  <h1>Metadata images</h1>
  <div class="cards" id="cards"></div>

  <script>
    // Layouts are auto-discovered server-side; the client reads them from /api/previews.
    let layouts = [];
    const DEFAULT_HEADING_SIZES = { A: 64, B: 56, C: 72 };
    const DEFAULT_TAGLINE_SIZES = { A: 28, B: 26, C: 22 };
    const FALLBACK_HEADING_SIZE = 64;
    const FALLBACK_TAGLINE_SIZE = 26;
    const DEFAULT_LAYOUT_SETTINGS = {
      A: { align: 'left', logoSize: 120, logoGap: 60, logoPosition: 'left' },
      B: { align: 'center', logoSize: 80, logoGap: 32, logoPosition: 'top' },
      C: { align: 'left', logoSize: 80, logoGap: 32, logoPosition: 'top' },
    };
    const FALLBACK_LAYOUT_SETTINGS = { align: 'center', logoSize: 96, logoGap: 32, logoPosition: 'top' };
    const cardOverrides = {};
    let config = {};
    let logoCandidates = [];
    let projectFonts = [];
    let faviconOverrides = {};

    function el(tag, attrs, ...children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'className') node.className = v;
          else if (k === 'textContent') node.textContent = v;
          else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
          else node.setAttribute(k, v);
        }
      }
      for (const child of children) {
        if (child == null) continue;
        if (typeof child === 'string') node.appendChild(document.createTextNode(child));
        else node.appendChild(child);
      }
      return node;
    }

    // --- FF-inspired component builders ---

    function ffSlider(value, min, max, unit, onChange) {
      const container = el('div', { className: 'ff-slider' });
      const fill = el('div', { className: 'ff-slider-fill' });
      const handle = el('div', { className: 'ff-slider-handle' });
      const valueEl = el('div', { className: 'ff-slider-value', textContent: `${value}${unit}` });
      const input = el('input', { type: 'range', min: String(min), max: String(max), value: String(value) });

      function update(v) {
        const pct = ((v - min) / (max - min)) * 100;
        fill.style.width = `${pct}%`;
        handle.style.left = `calc(${pct}% - 1px)`;
        valueEl.textContent = `${v}${unit}`;
      }

      update(value);
      input.addEventListener('input', () => update(input.value));
      input.addEventListener('change', () => onChange(parseInt(input.value)));

      container.append(fill, handle, valueEl, input);
      return container;
    }

    function ffColor(label, value, onChange) {
      const hexLabel = el('span', { className: 'ff-color-hex', textContent: value });
      const swatch = el('input', { type: 'color', className: 'ff-color-swatch', value: value });
      swatch.addEventListener('input', () => {
        hexLabel.textContent = swatch.value;
        onChange(swatch.value);
      });
      const wrap = el('div', { className: 'ff-color-wrap' });
      wrap.addEventListener('click', () => swatch.click());
      wrap.append(hexLabel, swatch);
      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        wrap
      );
    }

    function ffInput(label, value, onChange) {
      const input = el('input', { type: 'text', className: 'ff-input', value: value || '' });
      input.placeholder = label;
      input.addEventListener('change', () => onChange(input.value));
      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        input
      );
    }

    function ffSelect(label, options, selectedValue, onChange) {
      // options: [{ value, label }]
      const container = el('div', { className: 'ff-select' });

      const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      chevron.setAttribute('viewBox', '0 0 16 16');
      chevron.setAttribute('fill', 'none');
      chevron.classList.add('ff-select-chevron');
      chevron.innerHTML = '<path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';

      const selectedLabel = options.find(o => o.value === selectedValue)?.label || options[0]?.label || '';
      const triggerText = el('span', { textContent: selectedLabel });
      const trigger = el('div', { className: 'ff-select-trigger' });
      trigger.append(triggerText, chevron);

      const nativeSelect = document.createElement('select');
      options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        if (opt.value === selectedValue) o.selected = true;
        nativeSelect.appendChild(o);
      });
      nativeSelect.addEventListener('change', () => {
        const opt = options.find(o => o.value === nativeSelect.value);
        triggerText.textContent = opt?.label || nativeSelect.value;
        onChange(nativeSelect.value);
      });

      container.append(trigger, nativeSelect);
      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        container
      );
    }

    // --- FF-inspired Search Select (searchable combobox + upload) ---

    function ffSearchSelect(label, options, selectedValue, onChange, opts = {}) {
      // options: [{ value, label, hint? }]
      const container = el('div', { className: 'ff-search-select' });
      const input = el('input', {
        type: 'text',
        className: 'ff-search-input',
        placeholder: opts.placeholder || 'Type to search or upload…',
      });
      const fileInput = el('input', { type: 'file', accept: '.svg,.png,.jpg,.jpeg' });
      fileInput.style.display = 'none';
      const dropdown = el('div', { className: 'ff-search-dropdown' });

      let currentOptions = options.slice();
      let currentValue = selectedValue;

      function labelFor(value) {
        const opt = currentOptions.find(o => o.value === value);
        return opt?.label ?? value ?? '';
      }

      function setValue(value, fire = true) {
        currentValue = value;
        input.value = labelFor(value);
        closeDropdown();
        if (fire) onChange(value);
      }

      async function handleUpload(file) {
        try {
          const buf = await file.arrayBuffer();
          let binary = '';
          const bytes = new Uint8Array(buf);
          for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
          const dataBase64 = btoa(binary);
          const res = await fetch('/api/upload-logo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, dataBase64 }),
          });
          if (!res.ok) throw new Error('Upload failed');
          const data = await res.json();
          logoCandidates = data.candidates;
          if (!currentOptions.some(o => o.value === data.path)) {
            currentOptions.push({ value: data.path, label: data.path, hint: 'uploaded' });
          }
          setValue(data.path);
        } catch (err) {
          console.error('Upload error:', err);
        }
      }

      function renderOptions(filter) {
        dropdown.innerHTML = '';

        // Upload pinned at the top
        const uploadRow = el('div', { className: 'ff-search-option upload' },
          el('span', { className: 'icon', textContent: '+' }),
          el('span', { textContent: 'Upload file…' })
        );
        uploadRow.addEventListener('mousedown', (e) => {
          e.preventDefault();
          fileInput.click();
        });
        dropdown.appendChild(uploadRow);

        const q = (filter || '').toLowerCase().trim();
        const filtered = currentOptions.filter(o =>
          !q || o.label.toLowerCase().includes(q) || o.value.toLowerCase().includes(q)
        );

        if (filtered.length === 0) {
          dropdown.appendChild(el('div', { className: 'ff-search-option empty', textContent: 'No matches' }));
          return;
        }
        filtered.forEach((opt) => {
          const row = el('div', { className: 'ff-search-option' + (opt.value === currentValue ? ' selected' : '') });
          row.appendChild(el('span', { textContent: opt.label }));
          if (opt.hint) row.appendChild(el('span', { className: 'hint', textContent: opt.hint }));
          row.addEventListener('mousedown', (e) => {
            e.preventDefault();
            setValue(opt.value);
          });
          dropdown.appendChild(row);
        });
      }

      function openDropdown() {
        renderOptions(input.value);
        dropdown.classList.add('open');
      }
      function closeDropdown() {
        dropdown.classList.remove('open');
      }

      input.addEventListener('focus', () => {
        // Show all options on focus (don't filter by the currently-selected label)
        input.select();
        renderOptions('');
        dropdown.classList.add('open');
      });
      input.addEventListener('input', () => renderOptions(input.value));
      input.addEventListener('blur', () => {
        setTimeout(() => {
          closeDropdown();
          input.value = labelFor(currentValue);
        }, 120);
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeDropdown(); input.blur(); }
      });

      fileInput.addEventListener('change', async () => {
        const file = fileInput.files?.[0];
        if (!file) return;
        await handleUpload(file);
        fileInput.value = '';
      });

      container.append(input, fileInput, dropdown);

      container._setOptions = (newOptions) => {
        currentOptions = newOptions.slice();
        input.value = labelFor(currentValue);
      };

      input.value = labelFor(selectedValue);

      return el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: label }),
        container
      );
    }

    // --- OG Image cards ---

    function buildRefinePanel(layout) {
      const colors = config.colors || {};

      // Logo options
      const currentLogo = config.logo || null;
      const logoOpts = [];
      if (currentLogo) {
        logoOpts.push({ value: '__none__', label: currentLogo });
      } else {
        logoOpts.push({ value: '__none__', label: 'None (text only)' });
      }
      for (const c of logoCandidates) {
        if (c !== currentLogo) logoOpts.push({ value: c, label: c });
      }
      logoOpts.push({ value: '__hide__', label: 'Hide logo' });

      const defaults = DEFAULT_LAYOUT_SETTINGS[layout] || FALLBACK_LAYOUT_SETTINGS;
      const alignOpts = [
        { value: 'left', label: 'Left' },
        { value: 'center', label: 'Center' },
        { value: 'right', label: 'Right' },
      ];
      const logoPosOpts = [
        { value: 'left', label: 'Left of text' },
        { value: 'top', label: 'Above text' },
      ];
      const fontOpts = [
        { value: '__inter__', label: 'Inter (bundled)' },
        ...projectFonts.map(f => ({ value: f.path, label: f.label, hint: 'project' })),
      ];

      const panel = el('div', { className: 'refine-panel', id: `refine-${layout}` },
        ffColor('background', colors.background, (v) => updateOverride(layout, 'background', v)),
        ffColor('heading', colors.foreground, (v) => updateOverride(layout, 'foreground', v)),
        ffColor('tagline', colors.foreground, (v) => updateOverride(layout, 'taglineColor', v)),
        ffColor('accent', colors.accent, (v) => updateOverride(layout, 'accent', v)),
        ffInput('headline', config.title, (v) => updateOverride(layout, 'headline', v)),
        ffInput('tagline text', config.tagline, (v) => updateOverride(layout, 'tagline', v)),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'heading size' }),
          ffSlider(DEFAULT_HEADING_SIZES[layout] ?? FALLBACK_HEADING_SIZE, 24, 96, 'px', (v) => updateOverride(layout, 'headingSize', v))
        ),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'tagline size' }),
          ffSlider(DEFAULT_TAGLINE_SIZES[layout] ?? FALLBACK_TAGLINE_SIZE, 14, 48, 'px', (v) => updateOverride(layout, 'taglineSize', v))
        ),
        ffSelect('heading font', fontOpts, '__inter__', (v) => updateOverride(layout, 'headingFont', v)),
        ffSelect('tagline font', fontOpts, '__inter__', (v) => updateOverride(layout, 'taglineFont', v)),
        ffSelect('alignment', alignOpts, defaults.align, (v) => updateOverride(layout, 'align', v)),
        ffSearchSelect('logo', logoOpts, '__none__', (val) => {
          if (val === '__hide__') {
            cardOverrides[layout].showLogo = false;
            cardOverrides[layout].logoPath = undefined;
          } else if (val === '__none__') {
            cardOverrides[layout].showLogo = true;
            cardOverrides[layout].logoPath = undefined;
          } else {
            cardOverrides[layout].showLogo = true;
            cardOverrides[layout].logoPath = val;
          }
          rerender(layout);
        }, { placeholder: 'Search logos or type a path…' }),
        ffSelect('logo position', logoPosOpts, defaults.logoPosition, (v) => updateOverride(layout, 'logoPosition', v)),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'logo size' }),
          ffSlider(defaults.logoSize, 24, 260, 'px', (v) => updateOverride(layout, 'logoSize', v))
        ),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'logo gap' }),
          ffSlider(defaults.logoGap, 0, 120, 'px', (v) => updateOverride(layout, 'logoGap', v))
        )
      );
      return panel;
    }

    function buildCard(layout, index, imageSrc) {
      const previewImg = el('img', { id: `preview-${layout}`, src: imageSrc, alt: `Option ${index + 1}` });

      const customizeBtn = el('button', { textContent: 'Customize' });
      customizeBtn.addEventListener('click', () => toggleRefine(layout));

      const dlBtn = el('button', { className: 'primary', id: `dl-${layout}`, textContent: 'Download PNG' });
      dlBtn.addEventListener('click', () => downloadOg(layout));

      return el('div', { className: 'card' },
        el('div', { className: 'card-header' },
          el('div', { className: 'card-label', textContent: `Option ${index + 1}` })
        ),
        el('div', { className: 'card-preview' }, previewImg),
        el('div', { className: 'card-footer' },
          el('div', { className: 'card-actions' }, customizeBtn, dlBtn)
        ),
        buildRefinePanel(layout)
      );
    }

    // --- Option 4: free-text composer that wraps the user's style in a prompt ---

    const LAYOUT_STYLE_PRESETS = [
      { title: 'Gradient hero', text: 'Diagonal gradient from colors.background to colors.accent, 72px centered headline, tagline at 60% opacity, no logo.' },
      { title: 'Split with logo', text: 'Horizontal split — left 40% is colors.accent with centered 180px logo; right 60% is colors.background with top-aligned 56px headline and 24px tagline below.' },
      { title: 'Minimalist mono', text: 'Solid colors.background, 32px accent border inset at 15% opacity, centered 64px headline, small uppercase tagline (18px, letter-spacing 0.12em) beneath, 48px logo top-left.' },
    ];

    let toolInfo = null;

    function nextLetter(existing) {
      const used = new Set(existing || []);
      for (let c = 65; c <= 90; c++) {
        const L = String.fromCharCode(c);
        if (!used.has(L)) return L;
      }
      return null;
    }

    function buildPrompt(style) {
      const letter = nextLetter(toolInfo.existingLetters);
      if (!letter) return null;
      return [
        'Add a new metadata image layout to this project.',
        '',
        `Project root: ${toolInfo.projectRoot}`,
        `Read this file first: ${toolInfo.agentsMdPath}`,
        `Create the new layout at: ${toolInfo.templatesDir}/layout-${letter.toLowerCase()}.js`,
        '',
        'Quick reference (full details in AGENTS.md):',
        '- Export one function: (config) => Satori JSX object. Canvas is 1200x630.',
        '- config: { headline, tagline, colors: { background, foreground, accent, tagline }, logoBase64, headingSize, taglineSize, align, logoSize, logoGap, logoPosition }',
        "- Satori CSS subset: flex only (no grid/transform/filter/pseudo-elements/box-shadow-spread). linear-gradient, borderRadius, opacity, position:absolute all OK. fontFamily 'Inter' at weight 400 or 700.",
        '- No registration — the file is auto-discovered on next server restart.',
        '',
        'Style:',
        style,
      ].join('\n');
    }

    function buildOption4Card() {
      const preview = el('div', { className: 'card-preview' },
        el('div', { className: 'card-preview-inner' },
          el('div', { className: 'title', textContent: 'Generate a new layout' }),
          el('div', { className: 'sub', textContent: 'Describe a style, then copy the prompt into your AI coding assistant' })
        )
      );

      const textarea = el('textarea', {
        className: 'prompt-textarea',
        placeholder: 'Describe your layout style… e.g. "Diagonal gradient, 72px centered headline, no logo"',
        rows: 4,
      });

      const chipRow = el('div', { className: 'prompt-chip-row' });
      LAYOUT_STYLE_PRESETS.forEach((p) => {
        const chip = el('button', { type: 'button', className: 'prompt-chip', textContent: p.title });
        chip.addEventListener('click', () => {
          textarea.value = p.text;
          textarea.focus();
        });
        chipRow.appendChild(chip);
      });

      const copyBtn = el('button', { type: 'button', className: 'primary prompt-copy-full', textContent: 'Copy prompt' });
      copyBtn.addEventListener('click', async () => {
        const style = (textarea.value || '').trim();
        if (!style) {
          textarea.focus();
          return;
        }
        const prompt = buildPrompt(style);
        if (!prompt) {
          copyBtn.textContent = 'All 26 letters used';
          setTimeout(() => { copyBtn.textContent = 'Copy prompt'; }, 1800);
          return;
        }
        try {
          await navigator.clipboard.writeText(prompt);
          const prev = copyBtn.textContent;
          copyBtn.textContent = 'Copied';
          setTimeout(() => { copyBtn.textContent = prev; }, 1400);
        } catch (err) {
          console.error('Copy failed:', err);
        }
      });

      const composer = el('div', { className: 'prompt-composer' },
        el('div', { className: 'prompt-chip-label', textContent: 'Start from a preset' }),
        chipRow,
        textarea,
        el('div', { className: 'prompt-composer-actions' }, copyBtn)
      );

      return el('div', { className: 'card option-4' },
        el('div', { className: 'card-header' },
          el('div', { className: 'card-label', textContent: 'Option 4' })
        ),
        preview,
        composer
      );
    }

    async function loadPreviews() {
      const [previewsRes, configRes, logosRes, fontsRes, toolInfoRes] = await Promise.all([
        fetch('/api/previews'),
        fetch('/api/config'),
        fetch('/api/logo-candidates'),
        fetch('/api/fonts'),
        fetch('/api/tool-info'),
      ]);
      const previews = await previewsRes.json();
      config = await configRes.json();
      logoCandidates = await logosRes.json();
      projectFonts = await fontsRes.json();
      toolInfo = await toolInfoRes.json();

      layouts = Object.keys(previews).sort();
      layouts.forEach((l) => { cardOverrides[l] ??= {}; });

      const container = document.getElementById('cards');
      container.innerHTML = '';
      layouts.forEach((layout, i) => {
        container.appendChild(buildCard(layout, i, previews[layout]));
      });
      container.appendChild(buildOption4Card());
    }

    function toggleRefine(layout) {
      document.getElementById(`refine-${layout}`).classList.toggle('open');
    }

    async function updateOverride(layout, key, value) {
      cardOverrides[layout][key] = value;
      await rerender(layout);
    }

    async function rerender(layout) {
      const img = document.getElementById(`preview-${layout}`);
      img.style.opacity = '0.5';
      try {
        const res = await fetch('/api/render', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layout, overrides: cardOverrides[layout] }),
        });
        const data = await res.json();
        img.src = data.image;
      } catch (err) {
        console.error('Render failed:', err);
      } finally {
        img.style.opacity = '1';
      }
    }

    async function downloadOg(layout) {
      const btn = document.getElementById(`dl-${layout}`);
      btn.disabled = true;
      btn.textContent = 'Saving...';
      try {
        const res = await fetch('/api/download/og', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ layout }),
        });
        const data = await res.json();
        const span = el('span', { className: 'success', textContent: `\u2713 Saved to ${data.path}` });
        btn.replaceWith(span);
      } catch (err) {
        btn.textContent = 'Error';
        console.error('Download failed:', err);
      }
    }

    // --- Favicon section ---

    const FAVICON_DISPLAY_SIZES = { 16: 16, 32: 32, 96: 64, 180: 96 };

    function buildFaviconMode(label, cssClass, previews, sizes, headerExtra) {
      const previewsContainer = el('div', { className: 'favicon-previews' });
      sizes.forEach(size => {
        const displaySize = FAVICON_DISPLAY_SIZES[size] || Math.min(size, 96);
        // Images are 2x for retina — display at 1x
        const img = el('img', { src: previews[size], width: displaySize, height: displaySize });
        previewsContainer.appendChild(
          el('div', { className: 'favicon-preview' },
            img,
            el('span', { className: 'favicon-size', textContent: `${size}px` })
          )
        );
      });
      const header = el('div', { className: 'favicon-mode-header' },
        el('div', { className: 'favicon-mode-label', textContent: label })
      );
      if (headerExtra) header.appendChild(headerExtra);
      return el('div', { className: `favicon-mode ${cssClass}` }, header, previewsContainer);
    }

    function buildCustomBgPicker() {
      const value = faviconOverrides.customBg || '#6B97FF';
      const hexLabel = el('span', { className: 'ff-color-hex', textContent: value });
      const swatch = el('input', { type: 'color', className: 'ff-color-swatch', value: value });
      swatch.addEventListener('input', () => {
        hexLabel.textContent = swatch.value;
        faviconOverrides.customBg = swatch.value;
        // Apply bg color immediately for instant feedback
        const mode = document.querySelector('.favicon-mode.custom');
        if (mode) mode.style.background = swatch.value;
      });
      swatch.addEventListener('change', () => rerenderFavicons());
      const wrap = el('div', { className: 'ff-color-wrap' });
      wrap.style.background = 'rgba(255,255,255,0.08)';
      wrap.addEventListener('click', () => swatch.click());
      wrap.append(hexLabel, swatch);
      return wrap;
    }

    function renderFaviconGrid(data) {
      const grid = document.getElementById('faviconGrid');
      const sizes = [16, 32, 96, 180];
      grid.innerHTML = '';
      const customBg = faviconOverrides.customBg || '#6B97FF';
      const customPreviews = data.custom || (() => {
        // When no custom previews yet (first load), fall back to light previews visually
        const fallback = {};
        for (const s of sizes) fallback[s] = data.light[s];
        return fallback;
      })();
      const customMode = buildFaviconMode(
        'Custom background',
        'custom',
        customPreviews,
        sizes,
        buildCustomBgPicker()
      );
      customMode.style.background = customBg;
      grid.appendChild(el('div', { className: 'favicon-card' },
        buildFaviconMode('Light background', 'light', data.light, sizes),
        buildFaviconMode('Dark background', 'dark', data.dark, sizes),
        customMode
      ));

      // Update browser tab previews with the 32px favicon from each mode
      const tabLight = document.getElementById('tabFaviconLight');
      const tabDark = document.getElementById('tabFaviconDark');
      if (tabLight && data.light?.[32]) tabLight.src = data.light[32];
      if (tabDark && data.dark?.[32]) tabDark.src = data.dark[32];
    }

    async function rerenderFavicons() {
      try {
        const res = await fetch('/api/render-favicon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(faviconOverrides),
        });
        const data = await res.json();
        renderFaviconGrid(data);
      } catch (err) {
        console.error('Favicon render failed:', err);
      }
    }

    function ffToggle(label, initial, onChange) {
      const track = el('div', { className: `ff-toggle-track${initial ? ' active' : ''}` });
      const thumb = el('div', { className: 'ff-toggle-thumb' });
      track.appendChild(thumb);
      let state = initial;
      const wrap = el('div', { className: 'ff-toggle' });
      wrap.addEventListener('click', () => {
        state = !state;
        track.classList.toggle('active', state);
        onChange(state);
      });
      wrap.append(track, document.createTextNode(label));
      return wrap;
    }

    function buildFaviconCustomizePanel() {
      const defaultLetter = (config.title || 'A')[0].toUpperCase();
      const colors = config.colors || {};
      const defaultAccent = colors.accent || '#333333';

      const letterInput = el('input', { type: 'text', className: 'ff-input', value: defaultLetter, maxLength: '4' });
      letterInput.style.width = '80px';
      letterInput.style.textAlign = 'center';
      letterInput.addEventListener('change', () => {
        const v = letterInput.value.trim();
        if (v) faviconOverrides.letter = v;
        else delete faviconOverrides.letter;
        rerenderFavicons();
      });

      const srcOpts = [{ value: '__lettermark__', label: 'Lettermark' }];
      for (const c of logoCandidates) srcOpts.push({ value: c, label: c });

      const weightOpts = [
        { value: '400', label: 'Regular' },
        { value: '700', label: 'Bold' },
      ];

      const panel = document.getElementById('faviconCustomize');
      panel.innerHTML = '';

      // Source first — Lettermark or a logo file
      const initialSrc = config.faviconSrc || '__lettermark__';
      panel.appendChild(ffSearchSelect('source', srcOpts, initialSrc, (v) => {
        faviconOverrides.faviconSrc = v === '__lettermark__' ? null : v;
        updateLettermarkVisibility(v === '__lettermark__');
        rerenderFavicons();
      }, { placeholder: 'Search logos or upload…' }));

      // Transparent toggle sits directly below source
      panel.appendChild(el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'transparent' }),
        ffToggle('Transparent background', false, (v) => {
          faviconOverrides.transparent = v;
          updateTransparentVisibility(v);
          rerenderFavicons();
        })
      ));

      // Opaque-only rows (apply to both lettermark & logo sources)
      const bgRow = ffColor('background', colors.background, (v) => { faviconOverrides.background = v; rerenderFavicons(); });
      const darkBgRow = ffColor('dark bg', '#000000', (v) => { faviconOverrides.darkBg = v; rerenderFavicons(); });
      const cornerRow = el('div', { className: 'refine-row' },
        el('span', { className: 'refine-label', textContent: 'corner radius' }),
        ffSlider(19, 0, 50, '%', (v) => { faviconOverrides.borderRadius = v; rerenderFavicons(); })
      );
      [bgRow, darkBgRow, cornerRow].forEach(r => { r.dataset.opaqueOnly = '1'; });

      panel.appendChild(bgRow);
      panel.appendChild(darkBgRow);
      panel.appendChild(cornerRow);

      function updateTransparentVisibility(isTransparent) {
        panel.querySelectorAll('[data-opaque-only]').forEach(r => {
          r.style.display = isTransparent ? 'none' : '';
        });
      }

      // Lettermark-only controls — hidden when a logo source is selected
      const lettermarkRows = [
        ffColor('letter color', defaultAccent, (v) => { faviconOverrides.accent = v; rerenderFavicons(); }),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'letter' }),
          letterInput
        ),
        el('div', { className: 'refine-row' },
          el('span', { className: 'refine-label', textContent: 'letter size' }),
          ffSlider(60, 20, 80, '%', (v) => { faviconOverrides.letterSize = v; rerenderFavicons(); })
        ),
        ffSelect('font weight', weightOpts, '700', (v) => {
          faviconOverrides.fontWeight = parseInt(v);
          rerenderFavicons();
        }),
      ];
      lettermarkRows.forEach(r => { r.dataset.lettermarkOnly = '1'; panel.appendChild(r); });

      function updateLettermarkVisibility(isLettermark) {
        panel.querySelectorAll('[data-lettermark-only]').forEach(r => {
          r.style.display = isLettermark ? '' : 'none';
        });
      }
      updateLettermarkVisibility(initialSrc === '__lettermark__');
    }

    async function loadFaviconPreviews() {
      // Seed default customBg so the custom mode renders on first paint
      faviconOverrides.customBg = faviconOverrides.customBg || '#6B97FF';
      const res = await fetch('/api/render-favicon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(faviconOverrides),
      });
      const data = await res.json();
      renderFaviconGrid(data);

      const actions = document.getElementById('faviconActions');
      actions.innerHTML = '';

      const customizeBtn = el('button', { textContent: 'Customize' });
      customizeBtn.addEventListener('click', () => {
        const panel = document.getElementById('faviconCustomize');
        if (!panel.hasChildNodes()) buildFaviconCustomizePanel();
        panel.classList.toggle('open');
      });

      const dlBtn = el('button', { className: 'primary', textContent: 'Download favicon set' });
      dlBtn.addEventListener('click', async () => {
        dlBtn.disabled = true;
        dlBtn.textContent = 'Saving...';
        try {
          const res = await fetch('/api/download/favicons', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
          const data = await res.json();
          const span = el('span', { className: 'success',
            textContent: `\u2713 Saved to ${config.outputDir || 'public/metadata'}/ (${data.count} files)` });
          dlBtn.replaceWith(span);
        } catch (err) {
          dlBtn.textContent = 'Error';
          console.error('Favicon download failed:', err);
        }
      });

      const sizesBtn = el('button', { textContent: 'Show all sizes' });
      sizesBtn.addEventListener('click', () => {
        const panel = document.getElementById('faviconGrid');
        const isOpen = panel.classList.toggle('open');
        sizesBtn.textContent = isOpen ? 'Hide all sizes' : 'Show all sizes';
      });

      actions.appendChild(sizesBtn);
      actions.appendChild(customizeBtn);
      actions.appendChild(dlBtn);
    }

    loadPreviews();
    loadFaviconPreviews();
  </script>
</body>
</html>
